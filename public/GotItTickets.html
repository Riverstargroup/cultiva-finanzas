<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Got It Tickets - Task Manager</title>
    <!-- Usando la fuente Inter para un look moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Iconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #2C5E3B;
            /* Verde orgánico (Semilla) */
            --primary-hover: #1E4229;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            align-items: start;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .form-panel,
        .tickets-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        h2 {
            margin-top: 0;
            font-size: 1.25rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.875rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 94, 59, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 0.875rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* Tickets Styles */
        .tickets-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ticket-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            background: #fff;
            transition: box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
        }

        .ticket-card:hover {
            box-shadow: var(--shadow);
            border-color: #d1d5db;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .ticket-title {
            font-weight: 600;
            font-size: 1.125rem;
            margin: 0;
            padding-right: 2rem;
        }

        .ticket-desc {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .ticket-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            padding-top: 0.75rem;
            border-top: 1px dashed var(--border);
        }

        .ticket-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            align-items: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .priority-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .priority-Alta {
            background: #fee2e2;
            color: #991b1b;
        }

        .priority-Media {
            background: #fef3c7;
            color: #92400e;
        }

        .priority-Baja {
            background: #d1fae5;
            color: #065f46;
        }

        .ticket-actions {
            display: flex;
            gap: 0.5rem;
            position: absolute;
            top: 1rem;
            right: 1rem;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 32px;
            height: 32px;
            padding: 0;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            color: var(--text-main);
            background: #f3f4f6;
        }

        .btn-icon.delete:hover {
            color: var(--danger);
            border-color: var(--danger);
            background: #fef2f2;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            background: #f9fafb;
            border-radius: 8px;
            border: 1px dashed var(--border);
        }

        /* Editing State */
        .editing-mode {
            background-color: #f0fdf4;
            border-color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Panel del Formulario -->
        <aside class="form-panel">
            <h2 id="form-title">Nuevo Ticket</h2>
            <form id="ticket-form">
                <!-- Se usa un input hidden para saber si estamos editando -->
                <input type="hidden" id="task-id">

                <div class="form-group">
                    <label for="title">Título del Ticket *</label>
                    <input type="text" id="title" placeholder="Ej. Pagar servicios" required>
                </div>

                <div class="form-group">
                    <label for="description">Descripción / Información del equipo</label>
                    <textarea id="description" placeholder="Detalles de la obligación operativa..."></textarea>
                </div>

                <div class="form-group">
                    <label for="dueDate">Fecha Límite *</label>
                    <input type="date" id="dueDate" required>
                </div>

                <div class="form-group">
                    <label for="priority">Prioridad</label>
                    <select id="priority">
                        <option value="Baja">Baja</option>
                        <option value="Media" selected>Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <i data-lucide="plus-circle" style="width:18px;height:18px;"></i>
                    Crear Ticket
                </button>
                <button type="button" id="cancel-btn"
                    style="display:none; margin-top:0.5rem; background:#f3f4f6; color:#4b5563; border: 1px solid #d1d5db;">
                    Cancelar Edición
                </button>
            </form>
        </aside>

        <!-- Panel de Visualización -->
        <main class="tickets-panel">
            <h2>Tickets Activos ("Got It")</h2>
            <div id="tickets-container" class="tickets-container">
                <!-- Los tickets se renderizarán aquí -->
            </div>
        </main>
    </div>

    <script>
        /**
         * 1. Definición del Modelo de Datos (Clases)
         */
        class Task {
            constructor(id, title, description, dueDate, priority) {
                this.id = id;
                this.title = title;
                this.description = description;
                this.dueDate = dueDate;
                this.priority = priority;
            }
        }

        class TaskManager {
            constructor() {
                this.tasks = [];
                this.load();
            }

            // Cargar tareas e implementar Fallback (Mock Schema & Failover)
            async load() {
                try {
                    // Intento de Fetch a la tabla tickets de Supabase
                    const response = await fetch('https://tubase.supabase.co/rest/v1/tickets?select=*', {
                        method: 'GET',
                        headers: {
                            'apikey': 'SUPABASE_CLIENT_API_KEY',
                            'Authorization': 'Bearer SUPABASE_CLIENT_API_KEY'
                        }
                    });

                    if (!response.ok) throw new Error('Supabase fetch failed');

                    const data = await response.json();
                    this.tasks = data.map(t => new Task(t.id, t.title, t.description, t.dueDate, t.priority));
                } catch (error) {
                    // Lógica de Fallback: Cargar tareas guardadas desde localStorage
                    console.log('Fallback a localStorage activado:', error.message);
                    const storedTasks = localStorage.getItem('gotit_tickets');
                    if (storedTasks) {
                        const parsed = JSON.parse(storedTasks);
                        this.tasks = parsed.map(t => new Task(t.id, t.title, t.description, t.dueDate, t.priority));
                    }
                }

                this.renderTasks();
            }

            // Sincronizar (save) con tubería lista para Supabase en el futuro
            async save(syncWithCloud = false) {
                // Guarda de forma persistente a localStorage usando JSON.stringify
                localStorage.setItem('gotit_tickets', JSON.stringify(this.tasks));

                if (syncWithCloud) {
                    // TODO: Implementar Upsert a Supabase
                    try {
                        // Código ilustrativo mock
                        console.log('Sincronizando con Supabase nube...');
                        // await fetch(...) 
                    } catch (err) {
                        console.error('Cloud Sync failed', err);
                    }
                }
            }

            /**
             * 2. Implementación de Métodos Core
             */

            // Valida título y fecha, genera ID único y guarda en constante y Storage
            createTask(title, description, dueDate, priority) {
                if (!title.trim() || !dueDate.trim()) {
                    alert("Por favor, completa el título y la fecha límite.");
                    return;
                }
                const newId = Date.now(); // ID Numérico único basado en timestamp
                const newTask = new Task(newId, title.trim(), description.trim(), dueDate, priority);

                this.tasks.push(newTask);
                this.save(false); // Sincronización Cloud desactivada por ahora
                this.renderTasks();
            }

            // Localiza la tarea por ID y actualiza/sobreescribe los datos sin duplicar
            updateTask(id, title, description, dueDate, priority) {
                if (!title.trim() || !dueDate.trim()) {
                    alert("El título y la fecha límite son obligatorios.");
                    return;
                }

                const index = this.tasks.findIndex(t => t.id === id);
                if (index !== -1) {
                    this.tasks[index].title = title.trim();
                    this.tasks[index].description = description.trim();
                    this.tasks[index].dueDate = dueDate;
                    this.tasks[index].priority = priority;

                    this.save(false);
                    this.renderTasks();
                }
            }

            // Elimina la tarea del array e inmediatamente limpia el localStorage
            deleteTask(id) {
                if (confirm("¿Estás seguro de cerrar/eliminar este ticket?")) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.save(false); // Inmediatamente limpia y sobreescribe localStorage 
                    this.renderTasks();
                }
            }

            // Genera dinámicamente el HTML para visualizar los tickets
            renderTasks() {
                const container = document.getElementById('tickets-container');
                container.innerHTML = '';

                if (this.tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="check-circle" style="width:48px;height:48px;margin-bottom:1rem;color:#9ca3af;"></i>
                            <p>No hay obligaciones pendientes. ¡Todo en orden!</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                // Ordenar por fecha (opcional, pero útil)
                const sortedTasks = [...this.tasks].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

                sortedTasks.forEach(task => {
                    // Formatear Fecha (YYYY-MM-DD a Formato Local)
                    const dateObj = new Date(task.dueDate + 'T00:00:00'); // Evita timezone offset issues
                    const formattedDate = dateObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });

                    const card = document.createElement('div');
                    card.className = 'ticket-card';
                    card.innerHTML = `
                        <div class="ticket-actions">
                            <button class="btn-icon" onclick="startEditing(${task.id})" title="Editar ticket">
                                <i data-lucide="pencil" style="width:16px;height:16px;"></i>
                            </button>
                            <button class="btn-icon delete" onclick="deleteTaskHandler(${task.id})" title="Eliminar ticket">
                                <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
                            </button>
                        </div>
                        <div class="ticket-header">
                            <h3 class="ticket-title">${escapeHTML(task.title)}</h3>
                        </div>
                        <p class="ticket-desc">${escapeHTML(task.description) || '<em style="color:#9ca3af">Sin descripción...</em>'}</p>
                        <div class="ticket-footer">
                            <div class="ticket-meta">
                                <div class="meta-item" title="Fecha límite">
                                    <i data-lucide="calendar" style="width:14px;height:14px;"></i>
                                    <strong>${formattedDate}</strong>
                                </div>
                                <div class="meta-item">
                                    <i data-lucide="hash" style="width:14px;height:14px;"></i>
                                    ID: ${task.id.toString().slice(-5)}
                                </div>
                            </div>
                            <span class="priority-badge priority-${task.priority}">${task.priority}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Inicializar iconos de la librería Lucide
                lucide.createIcons();
            }
        }

        // ==========================================
        // Inicialización y Vinculación con el DOM
        // ==========================================
        const manager = new TaskManager();

        // Referencias a elementos UI
        const form = document.getElementById('ticket-form');
        const formTitle = document.getElementById('form-title');
        const idInput = document.getElementById('task-id');
        const titleInput = document.getElementById('title');
        const descInput = document.getElementById('description');
        const dateInput = document.getElementById('dueDate');
        const priorityInput = document.getElementById('priority');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');

        // Función auxiliar para seguridad XSS
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Manejador del Envio del Formulario (Crear o Actualizar)
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const title = titleInput.value;
            const desc = descInput.value;
            const date = dateInput.value;
            const priority = priorityInput.value;
            const editId = idInput.value;

            if (editId) {
                // Actualizando
                manager.updateTask(parseInt(editId), title, desc, date, priority);
                resetForm();
            } else {
                // Creando
                manager.createTask(title, desc, date, priority);
                form.reset();
            }
        });

        // 3. Interfaz y Flujo de Usuario - Funciones Controlador

        window.deleteTaskHandler = function (id) {
            manager.deleteTask(id);
            // Si el ticket eliminado estaba en edición, limpiar form
            if (idInput.value == id) {
                resetForm();
            }
        }

        window.startEditing = function (id) {
            const task = manager.tasks.find(t => t.id === id);
            if (!task) return;

            // Poblar fomulario
            idInput.value = task.id;
            titleInput.value = task.title;
            descInput.value = task.description;
            dateInput.value = task.dueDate;
            priorityInput.value = task.priority;

            // Cambiar UI de modo creación a edición
            formTitle.textContent = "Editar Ticket";
            submitBtn.innerHTML = `<i data-lucide="save" style="width:18px;height:18px;"></i> Guardar Cambios`;
            form.closest('.form-panel').classList.add('editing-mode');
            cancelBtn.style.display = 'block';

            lucide.createIcons();

            // Scroll hacia arriba en móviles
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            form.reset();
            idInput.value = '';
            formTitle.textContent = "Nuevo Ticket";
            submitBtn.innerHTML = `<i data-lucide="plus-circle" style="width:18px;height:18px;"></i> Crear Ticket`;
            form.closest('.form-panel').classList.remove('editing-mode');
            cancelBtn.style.display = 'none';
            lucide.createIcons();
        }

        // Botón Cancelar
        cancelBtn.addEventListener('click', resetForm);

    </script>
</body>

</html>
